<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Pi</title>
  <style>
    /* reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a2e;
      --bg-elevated: #252540;
      --fg: #e8e6f0;
      --fg-dim: #8a8aad;
      --accent: #7ec8e3;
      --accent-dim: #5a9bb5;
      --border: #3a3a5c;
      --tool-bg: #1e1e35;
      --success: #6ecf7e;
      --error: #e86868;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", sans-serif;
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f6f9;
        --bg-elevated: #ffffff;
        --fg: #1a1a2e;
        --fg-dim: #6a6a8a;
        --border: #d5d5e0;
        --tool-bg: #f0f0f5;
      }
    }
    html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: var(--font); overflow: hidden; }

    #app { display: flex; flex-direction: column; height: 100vh; }

    /* header */
    #header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg-elevated); }
    #header-left { display: flex; align-items: center; gap: 8px; }
    .logo { font-weight: 700; font-size: 20px; color: var(--accent); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fg-dim); display: inline-block; transition: background .2s; }
    .status-dot.connected { background: var(--success); }
    .status-dot.streaming { background: var(--accent); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .status-text { font-size: 12px; color: var(--fg-dim); }
    #header-right { display: flex; gap: 4px; }
    .btn { border: 1px solid var(--border); background: var(--bg-elevated); color: var(--fg); padding: 6px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .btn:active { opacity: .7; }
    .btn.send { background: var(--accent); color: #1a1a2e; border-color: var(--accent); font-weight: 600; }
    .btn.danger { border-color: var(--error); color: var(--error); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* messages */
    #messages { flex: 1; overflow-y: auto; padding: 8px 10px; scroll-behavior: smooth; }
    .msg { margin-bottom: 10px; display: flex; flex-direction: column; }
    .msg-user { align-items: flex-end; }
    .msg-assistant { align-items: flex-start; }
    .bubble { max-width: 92%; padding: 8px 12px; border-radius: 14px; font-size: 15px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
    .bubble-user { background: var(--accent); color: #1a1a2e; border-bottom-right-radius: 4px; }
    .bubble-assistant { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--fg); border-bottom-left-radius: 4px; width: 100%; max-width: 100%; }
    .bubble-assistant p { margin-bottom: .5em; }
    .bubble-assistant p:last-child { margin-bottom: 0; }
    .bubble-assistant pre { background: var(--tool-bg); padding: 8px; border-radius: 6px; overflow-x: auto; font-family: var(--mono); font-size: 13px; margin: .4em 0; }
    .bubble-assistant code { font-family: var(--mono); font-size: 13px; background: var(--tool-bg); padding: 1px 4px; border-radius: 3px; }
    .bubble-assistant pre code { background: none; padding: 0; }
    .bubble-assistant ul, .bubble-assistant ol { padding-left: 1.2em; margin: .4em 0; }
    .bubble-assistant blockquote { border-left: 3px solid var(--accent-dim); padding-left: 10px; margin: .4em 0; color: var(--fg-dim); }
    .bubble-assistant a { color: var(--accent); }

    /* tool card */
    .tool-card { border: 1px solid var(--border); border-radius: 8px; margin: 4px 0; overflow: hidden; background: var(--tool-bg); }
    .tool-header { display: flex; align-items: center; gap: 8px; padding: 6px 10px; cursor: pointer; font-size: 13px; }
    .tool-icon { font-size: 14px; }
    .tool-name { font-weight: 600; flex: 1; }
    .tool-args { color: var(--fg-dim); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40%; }
    .tool-status { font-size: 11px; border-radius: 4px; padding: 1px 5px; }
    .tool-status.running { background: var(--accent); color: #1a1a2e; }
    .tool-status.done { background: var(--success); color: #1a1a2e; }
    .tool-status.error { background: var(--error); color: #fff; }
    .tool-body { display: none; padding: 8px 10px; border-top: 1px solid var(--border); font-size: 13px; }
    .tool-card.open .tool-body { display: block; }
    .tool-body pre { background: var(--bg); padding: 6px; border-radius: 4px; overflow-x: auto; font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-word; }
    .tool-label { color: var(--fg-dim); font-size: 11px; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 3px; }

    /* thinking block */
    .thinking-block { border: 1px solid var(--border); border-radius: 8px; margin: 4px 0; overflow: hidden; background: var(--tool-bg); }
    .thinking-header { display: flex; align-items: center; gap: 8px; padding: 6px 10px; cursor: pointer; font-size: 13px; color: var(--fg-dim); }
    .thinking-body { display: none; padding: 8px 10px; border-top: 1px solid var(--border); font-size: 13px; color: var(--fg-dim); line-height: 1.5; white-space: pre-wrap; }
    .thinking-block.open .thinking-body { display: block; }

    /* streaming indicator */
    #streaming-bar { display: none; padding: 6px 12px; text-align: center; font-size: 13px; color: var(--accent); border-top: 1px solid var(--border); flex-shrink: 0; }
    #streaming-bar.visible { display: block; }

    /* input */
    #input-area { display: flex; align-items: flex-end; gap: 6px; padding: 8px 10px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg-elevated); }
    #prompt { flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; font-size: 15px; background: var(--bg); color: var(--fg); resize: none; max-height: 120px; font-family: inherit; outline: none; -webkit-appearance: none; }
    #prompt:focus { border-color: var(--accent); }

    /* compact on mobile */
    @media (max-width:480px) {
      .bubble { font-size: 14px; }
      .btn { padding: 8px 12px; font-size: 14px; }
      #prompt { font-size: 16px; } /* prevent iOS zoom */
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="header">
      <div id="header-left">
        <span class="logo">π</span>
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Connecting…</span>
      </div>
      <div id="header-right">
        <button class="btn" id="btn-clear" title="Clear conversation">Clear</button>
      </div>
    </header>

    <div id="messages"></div>
    <div id="streaming-bar"><span id="spinner">●</span> Working…</div>

    <div id="input-area">
      <textarea id="prompt" rows="1" placeholder="Message…" enterkeyhint="send"></textarea>
      <button class="btn send" id="btn-send">Send</button>
      <button class="btn danger" id="btn-abort" style="display:none">Stop</button>
    </div>
  </div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const state = {
  connected: false,
  streaming: false,
  messages: [], // raw AgentMessage objects from server
};
let ws = null;

// ── DOM ──────────────────────────────────────────────────────────────────────
const $messages  = document.getElementById('messages');
const $statusDot = document.getElementById('status-dot');
const $statusTxt = document.getElementById('status-text');
const $streamBar = document.getElementById('streaming-bar');
const $input     = document.getElementById('prompt');
const $btnSend   = document.getElementById('btn-send');
const $btnAbort  = document.getElementById('btn-abort');
const $btnClear  = document.getElementById('btn-clear');

// ── Markdown (tiny) ──────────────────────────────────────────────────────────
function mdToHtml(text) {
  if (!text) return '';
  let h = esc(text);
  // code blocks
  h = h.replace(/```([a-z]*)?\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${esc(code.trim())}</code></pre>`);
  // inline code
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  // bold / italic
  h = h.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  h = h.replace(/\*([^*]+)\*/g, '<i>$1</i>');
  // headings
  h = h.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
  h = h.replace(/^### (.*$)/gim, '<h3>$1</h3>');
  h = h.replace(/^## (.*$)/gim, '<h2>$1</h2>');
  h = h.replace(/^# (.*$)/gim, '<h1>$1</h1>');
  // lists
  h = h.replace(/^\s*[-*] (.*$)/gim, '<li>$1</li>');
  h = h.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // links
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // blockquote
  h = h.replace(/^&gt; (.*$)/gim, '<blockquote>$1</blockquote>');
  // paragraphs (simple)
  h = h.replace(/\n\n+/g, '</p><p>');
  h = '<p>' + h + '</p>';
  // clean up empty p
  h = h.replace(/<p><\/p>/g, '');
  return h;
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Rendering ────────────────────────────────────────────────────────────────
function render() {
  $messages.innerHTML = '';

  for (const msg of state.messages) {
    if (msg.role === 'user') {
      const text = typeof msg.content === 'string' ? msg.content : '';
      $messages.appendChild(makeUserBubble(text));
    } else if (msg.role === 'assistant') {
      $messages.appendChild(makeAssistantBubble(msg));
    } else if (msg.role === 'toolResult') {
      // tool results are rendered inside their parent assistant message
    }
  }

  updateStatus();
  $messages.scrollTop = $messages.scrollHeight;
}

function makeUserBubble(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  const b = document.createElement('div');
  b.className = 'bubble bubble-user';
  b.textContent = text;
  div.appendChild(b);
  return div;
}

function makeAssistantBubble(msg) {
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  const b = document.createElement('div');
  b.className = 'bubble bubble-assistant';

  const contentArr = Array.isArray(msg.content) ? msg.content : [];
  for (const block of contentArr) {
    if (block.type === 'text') {
      const span = document.createElement('span');
      span.innerHTML = mdToHtml(block.text || '');
      b.appendChild(span);
    } else if (block.type === 'thinking') {
      b.appendChild(makeThinkingBlock(block.thinking || ''));
    } else if (block.type === 'toolCall') {
      // tool result comes later as toolResult message
      const toolResult = findToolResult(block.id);
      b.appendChild(makeToolCard(block, toolResult));
    }
  }

  div.appendChild(b);
  return div;
}

function findToolResult(callId) {
  return state.messages.find(m => m.role === 'toolResult' && m.toolCallId === callId);
}

function makeToolCard(toolCall, result) {
  const wrap = document.createElement('div');
  wrap.className = 'tool-card';
  const args = typeof toolCall.arguments === 'object'
    ? JSON.stringify(toolCall.arguments).slice(0, 80)
    : String(toolCall.arguments || '').slice(0, 80);
  const running = !result;
  const isError = result?.isError || false;
  const output = result?.content?.[0]?.text || '';

  const header = document.createElement('div');
  header.className = 'tool-header';
  const icon = { bash:'⬡', read:'📖', edit:'✏️', write:'📝', grep:'🔍', find:'🗂️', ls:'📁' }[toolCall.name] || '🔧';
  header.innerHTML = `<span class="tool-icon">${icon}</span><span class="tool-name">${esc(toolCall.name)}</span><span class="tool-args">${esc(args)}</span><span class="tool-status ${running?'running':isError?'error':'done'}">${running?'…':isError?'err':'ok'}</span>`;
  header.onclick = () => wrap.classList.toggle('open');
  wrap.appendChild(header);

  if (output || toolCall.arguments) {
    const body = document.createElement('div');
    body.className = 'tool-body';
    if (toolCall.arguments) {
      body.innerHTML += `<div class="tool-label">Args</div><pre>${esc(typeof toolCall.arguments==='object'?JSON.stringify(toolCall.arguments,null,2):toolCall.arguments)}</pre>`;
    }
    if (output) {
      body.innerHTML += `<div class="tool-label">Output</div><pre>${esc(output)}</pre>`;
    }
    wrap.appendChild(body);
  }
  return wrap;
}

function makeThinkingBlock(text) {
  const wrap = document.createElement('div');
  wrap.className = 'thinking-block';
  const h = document.createElement('div');
  h.className = 'thinking-header';
  h.innerHTML = '💭 Thinking <span style="margin-left:auto;font-size:10px">▶</span>';
  h.onclick = () => wrap.classList.toggle('open');
  const body = document.createElement('div');
  body.className = 'thinking-body';
  body.textContent = text;
  wrap.appendChild(h);
  wrap.appendChild(body);
  return wrap;
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => { state.connected = true; updateStatus(); };
  ws.onclose = () => { state.connected = false; state.streaming = false; updateStatus(); setTimeout(connect, 3000); };
  ws.onerror = () => ws?.close();
  ws.onmessage = e => {
    try { handleEvent(JSON.parse(e.data)); } catch(err) { console.error('parse', err); }
  };
}

function send(cmd) { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(cmd)); }

function handleEvent(ev) {
  switch (ev.type) {
    case 'state_sync':
      state.messages = ev.messages || [];
      state.streaming = ev.streaming || false;
      render();
      break;

    case 'agent_start':
      state.streaming = true;
      updateStatus();
      break;

    case 'message_update': {
      const delta = ev.assistantMessageEvent;
      if (!delta) break;
      // A text_delta arrives; we re-sync from state_sync for simplicity,
      // but let's just append to the last assistant message if present.
      if (delta.type === 'text_delta') {
        const last = state.messages[state.messages.length - 1];
        if (last && last.role === 'assistant' && Array.isArray(last.content)) {
          const tb = last.content.find(b => b.type === 'text');
          if (tb) { tb.text = (tb.text || '') + (delta.delta || ''); }
          else { last.content.push({ type:'text', text: delta.delta || '' }); }
          // Partial re-render: just append text to the last bubble
          render();
        }
      }
      break;
    }

    case 'message_end': {
      // Replace the last assistant message with the complete one
      const idx = state.messages.findIndex(m => m.role === 'assistant' && m === ev.message);
      if (idx >= 0) state.messages[idx] = ev.message;
      else if (ev.message?.role === 'assistant') state.messages.push(ev.message);
      render();
      break;
    }

    case 'tool_execution_update':
    case 'tool_execution_end': {
      // Re-render to pick up tool result
      const idx = state.messages.findIndex(m => m.role === 'toolResult' && m.toolCallId === ev.toolCallId);
      if (idx >= 0) state.messages[idx] = ev.result || state.messages[idx];
      else if (ev.result) state.messages.push(ev.result);
      render();
      break;
    }

    case 'agent_end':
      state.streaming = false;
      updateStatus();
      break;
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function updateStatus() {
  $statusDot.className = 'status-dot ' + (state.connected ? state.streaming ? 'streaming' : 'connected' : '');
  $statusTxt.textContent = !state.connected ? 'Disconnected' : state.streaming ? 'Working…' : 'Connected';
  $streamBar.classList.toggle('visible', state.streaming);
  $btnSend.style.display = state.streaming ? 'none' : '';
  $btnAbort.style.display = state.streaming ? '' : 'none';
  $input.disabled = !state.connected;
}

function sendPrompt() {
  const text = $input.value.trim();
  if (!text || !state.connected || state.streaming) return;
  send({ type: 'prompt', message: text });
  $input.value = '';
  $input.style.height = 'auto';
}

// ── Event listeners ──────────────────────────────────────────────────────────
$btnSend.onclick = sendPrompt;
$btnAbort.onclick = () => send({ type: 'abort' });
$btnClear.onclick = () => { state.messages = []; render(); };

$input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
});
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
});

// Boot
connect();
render();
</script>
</body>
</html>
