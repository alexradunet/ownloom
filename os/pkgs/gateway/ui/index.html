<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>ownloom</title>
  <style>
    :root {
      --text: #111111;
      --text-muted: #6b7280;
      --surface: #ffffff;
      --surface-raised: #f9fafb;
      --border: #e5e7eb;
      --hover: #f3f4f6;
      --accent: #2563eb;
      --accent-fg: #ffffff;
      --accent-muted: #dbeafe;
      --error: #dc2626;
      --error-muted: #fee2e2;
    }
    :root[data-theme="dark"] {
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --surface: #111827;
      --surface-raised: #1f2937;
      --border: #374151;
      --hover: #1f2937;
      --accent: #3b82f6;
      --accent-fg: #ffffff;
      --accent-muted: #1e3a5f;
      --error: #ef4444;
      --error-muted: #3f1a1a;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --text: #f3f4f6;
        --text-muted: #9ca3af;
        --surface: #111827;
        --surface-raised: #1f2937;
        --border: #374151;
        --hover: #1f2937;
        --accent: #3b82f6;
        --accent-fg: #ffffff;
        --accent-muted: #1e3a5f;
        --error: #ef4444;
        --error-muted: #3f1a1a;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      display: flex; flex-direction: column;
      height: 100dvh; height: 100vh;
      background: var(--surface); color: var(--text);
      overflow: hidden;
    }

    .toolbar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .toolbar-left { display: flex; align-items: center; gap: 0.25rem; }
    .toolbar-title {
      flex: 1; text-align: center;
      font-weight: 600; font-size: 0.9rem;
      color: var(--text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      padding: 0 0.5rem;
    }
    .toolbar-right { display: flex; align-items: center; }
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 2rem; height: 2rem; border-radius: 0.4rem;
      background: transparent; border: none; color: var(--text); cursor: pointer;
    }
    .icon-btn:hover { background: var(--hover); }
    .icon-btn svg { width: 1.1rem; height: 1.1rem; }

    .chat { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .messages {
      flex: 1; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.75rem;
      min-height: 0;
    }
    .msg {
      max-width: 85%;
      padding: 0.65rem 0.9rem; border-radius: 0.75rem;
      font-size: 0.925rem; line-height: 1.5;
      word-break: break-word; white-space: pre-wrap;
    }
    .msg-user {
      align-self: flex-end;
      background: var(--accent); color: var(--accent-fg);
      border-bottom-right-radius: 0.2rem;
    }
    .msg-assistant {
      align-self: flex-start;
      background: var(--surface-raised);
      color: var(--text); border: 1px solid var(--border);
      border-bottom-left-radius: 0.2rem;
    }
    .msg-partial { opacity: 0.75; }
    .empty { margin: auto; color: var(--text-muted); font-size: 0.9rem; text-align: center; }

    .input-bar {
      display: flex; align-items: flex-end; gap: 0.5rem;
      padding: 0.65rem 0.75rem; border-top: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    textarea {
      flex: 1; resize: none;
      min-height: 2.5rem; max-height: 10rem;
      padding: 0.55rem 0.75rem; border-radius: 0.6rem;
      border: 1px solid var(--border); background: var(--surface-raised);
      color: var(--text); font: inherit; font-size: 0.925rem; line-height: 1.4; outline: none;
      field-sizing: content;
    }
    textarea:focus { border-color: var(--accent); }
    .action-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 2.25rem; height: 2.25rem; border-radius: 50%;
      border: none; cursor: pointer; flex-shrink: 0; color: var(--accent-fg);
    }
    .action-btn svg { width: 1rem; height: 1rem; }
    .send { background: var(--accent); }
    .send:hover { filter: brightness(1.1); }
    .stop { background: var(--error); }
    .stop:hover { filter: brightness(1.1); }

    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      opacity: 0; pointer-events: none; z-index: 50;
      transition: opacity 0.2s ease;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: min(18rem, 80vw); background: var(--surface);
      border-right: 1px solid var(--border);
      transform: translateX(-100%); z-index: 51;
      display: flex; flex-direction: column;
      transition: transform 0.25s ease;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem; font-weight: 600; border-bottom: 1px solid var(--border);
    }
    .drawer-close { background: transparent; border: none; color: var(--text); cursor: pointer; width: 2rem; height: 2rem; display: inline-flex; align-items: center; justify-content: center; border-radius: 0.4rem; }
    .drawer-close:hover { background: var(--hover); }
    .drawer-close svg { width: 1.1rem; height: 1.1rem; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
    .drawer-empty { padding: 2rem; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
    .s-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.75rem; margin: 0 0.5rem;
      border-radius: 0.4rem; cursor: pointer; user-select: none; transition: background 0.15s;
    }
    .s-item:hover { background: var(--hover); }
    .s-item.active { background: var(--accent-muted); }
    .s-item .info { flex: 1; min-width: 0; }
    .s-item .title { font-size: 0.85rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .s-item .date { font-size: 0.75rem; color: var(--text-muted); }
    .s-item .del-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 1.6rem; height: 1.6rem; border-radius: 0.3rem;
      border: none; background: transparent; color: var(--text-muted);
      cursor: pointer; opacity: 0; transition: opacity 0.15s;
    }
    .s-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { background: var(--error-muted); color: var(--error); }
  </style>
</head>
<body>

<header class="toolbar">
  <div class="toolbar-left">
    <button id="btn-drawer" class="icon-btn" title="Sessions" aria-label="Sessions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <button id="btn-new" class="icon-btn" title="New session" aria-label="New session">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
  <span class="toolbar-title" id="toolbar-title">ownloom</span>
  <div class="toolbar-right">
    <button id="btn-theme" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
      <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>
</header>

<div class="chat" id="chat">
  <div class="messages" id="messages">
    <div class="empty">Start a conversation with ownloom</div>
  </div>
  <div class="input-bar">
    <textarea id="input" placeholder="Message ownloom…" rows="1"></textarea>
    <button id="action-btn" class="action-btn send" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9"/></svg>
    </button>
  </div>
</div>

<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span>Sessions</span>
    <button class="drawer-close" id="drawer-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script type="module">
/* ── IndexedDB session store ─────────────────────────────────────────────── */
const DB_NAME = "ownloom-web-ui", DB_VERSION = 1;
let dbReady = null;
function initDb() {
  if (dbReady) return dbReady;
  dbReady = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("sessions")) db.createObjectStore("sessions", { keyPath: "id" });
    };
  });
  return dbReady;
}
async function withStore(mode, fn) {
  const db = await initDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("sessions", mode);
    const store = tx.objectStore("sessions");
    const req = fn(store);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
const SessionStore = {
  get: (id) => withStore("readonly", s => s.get(id)),
  getAll: () => withStore("readonly", s => s.getAll()),
  save: (session) => withStore("readwrite", s => s.put(session)),
  delete: (id) => withStore("readwrite", s => s.delete(id)),
};

/* ── Theme ───────────────────────────────────────────────────────────────── */
function getStoredTheme() { try { return localStorage.getItem("ownloom-theme"); } catch { return null; } }
function setStoredTheme(t) { try { localStorage.setItem("ownloom-theme", t); } catch {} }
function applyTheme(t) { document.documentElement.setAttribute("data-theme", t); }
function initTheme() {
  const stored = getStoredTheme();
  const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(stored ?? (prefersDark ? "dark" : "light"));
}
initTheme();

const ICON_SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
const ICON_MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';

const themeBtn = document.getElementById("btn-theme");
const themeIcon = document.getElementById("theme-icon");
function updateThemeIcon() {
  themeIcon.innerHTML = document.documentElement.getAttribute("data-theme") === "dark"
    ? ICON_SUN : ICON_MOON;
}
updateThemeIcon();
themeBtn.addEventListener("click", () => {
  const next = (document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
  applyTheme(next); setStoredTheme(next); updateThemeIcon();
});

/* ── WS client ───────────────────────────────────────────────────────────── */
const WS_URL = `ws://${location.host}/ws`;
class WsClient {
  constructor(url, onMsg) {
    this.url = url; this.onMsg = onMsg; this.ws = null; this.timer = null;
    this.connect();
  }
  connect() {
    this.ws = new WebSocket(this.url);
    this.ws.onopen = () => { if (this.timer) { clearTimeout(this.timer); this.timer = null; } };
    this.ws.onmessage = (e) => {
      if (typeof e.data !== "string") return;
      try { this.onMsg(JSON.parse(e.data)); } catch { console.error("WS parse fail", e.data); }
    };
    this.ws.onclose = () => {
      console.warn("WS disconnected, reconnecting in 2s…");
      this.timer = setTimeout(() => this.connect(), 2000);
    };
    this.ws.onerror = () => {};
  }
  send(text) {
    if (this.ws?.readyState === 1) this.ws.send(JSON.stringify({ type: "message", text }));
    else console.warn("WS not connected");
  }
  close() { if (this.timer) clearTimeout(this.timer); this.ws?.close(); }
}

/* ── Chat state ──────────────────────────────────────────────────────────── */
let messages = [], sessionId = null, streaming = false, aborted = false, buf = "";

const msgsEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const actBtn = document.getElementById("action-btn");
const titleEl = document.getElementById("toolbar-title");

const ws = new WsClient(WS_URL, (m) => {
  switch (m.type) {
    case "chunk": if (streaming && !aborted) { buf += m.text; renderMessages(); } break;
    case "reply": if (!aborted) { messages.push({ role: "assistant", content: m.text }); done(); } break;
    case "done": if (streaming && !aborted) { if (buf) messages.push({ role: "assistant", content: buf }); done(); } break;
    case "error": messages.push({ role: "assistant", content: `Error: ${m.text}` }); done(); break;
  }
});

function done() { streaming = false; buf = ""; maybeCreateSession(); renderMessages(); updateActionBtn(); }

function maybeCreateSession() {
  const hasU = messages.some(m => m.role === "user");
  const hasA = messages.some(m => m.role === "assistant");
  if (!sessionId && hasU && hasA) {
    sessionId = crypto.randomUUID();
    const url = new URL(location.href); url.searchParams.set("session", sessionId); history.replaceState({},"",url);
  }
  if (sessionId) SessionStore.save({ id: sessionId, title: genTitle(messages), messages: messages.filter(m=>!m.partial), createdAt: sessionId, lastModified: new Date().toISOString() });
}
function genTitle(msgs) {
  const first = msgs.find(m => m.role === "user");
  if (!first) return "";
  const t = first.content.trim();
  return t.length > 50 ? t.slice(0,47) + "…" : t;
}
function renderMessages() {
  const display = [...messages];
  if (streaming && buf) display.push({ role: "assistant", content: buf, partial: true });
  if (display.length === 0) { msgsEl.innerHTML = `<div class="empty">Start a conversation with ownloom</div>`; return; }
  msgsEl.innerHTML = display.map(m => `<div class="msg msg-${m.role}${m.partial ? " msg-partial" : ""}">${esc(m.content)}</div>`).join("");
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function esc(s) {
  const d = document.createElement("div"); d.textContent = s; return d.innerHTML;
}

function updateActionBtn() {
  if (streaming) {
    actBtn.className = "action-btn stop";
    actBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>`;
  } else {
    actBtn.className = "action-btn send";
    actBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9"/></svg>`;
  }
}
function handleSend() {
  const text = inputEl.value.trim();
  if (!text || streaming) return;
  inputEl.value = "";
  messages.push({ role: "user", content: text });
  ws.send(text);
  streaming = true; aborted = false; buf = "";
  renderMessages(); updateActionBtn();
}
actBtn.addEventListener("click", () => {
  if (streaming) { aborted = true; streaming = false; buf = ""; renderMessages(); updateActionBtn(); }
  else handleSend();
});
inputEl.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); } });

/* ── Session drawer ──────────────────────────────────────────────────────── */
const overlay = document.getElementById("drawer-overlay");
const drawer = document.getElementById("drawer");
const drawerBody = document.getElementById("drawer-body");
function openDrawer() { overlay.classList.add("open"); drawer.classList.add("open"); refreshSessionList(); }
function closeDrawer() { overlay.classList.remove("open"); drawer.classList.remove("open"); }
document.getElementById("btn-drawer").addEventListener("click", openDrawer);
document.getElementById("drawer-close").addEventListener("click", closeDrawer);
overlay.addEventListener("click", closeDrawer);

document.getElementById("btn-new").addEventListener("click", () => {
  sessionId = null; messages = []; streaming = false; buf = "";
  const url = new URL(location.href); url.search = ""; history.replaceState({},"",url);
  renderMessages(); titleEl.textContent = "ownloom";
});

async function refreshSessionList() {
  const sessions = await SessionStore.getAll();
  sessions.sort((a,b) => b.lastModified.localeCompare(a.lastModified));
  if (sessions.length === 0) { drawerBody.innerHTML = `<div class="drawer-empty">No saved sessions</div>`; return; }
  drawerBody.innerHTML = sessions.map(s => `
    <div class="s-item ${s.id === sessionId ? "active" : ""}" data-id="${s.id}">
      <div class="info">
        <div class="title">${esc(s.title)}</div>
        <div class="date">${new Date(s.lastModified).toLocaleDateString()}</div>
      </div>
      <button class="del-btn" data-del="${s.id}" aria-label="Delete">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>`).join("");
  drawerBody.querySelectorAll(".s-item").forEach(el => {
    el.addEventListener("click", async () => {
      const id = el.dataset.id;
      const s = await SessionStore.get(id); if (!s) return;
      sessionId = id; messages = s.messages.map(m => ({...m, partial: false}));
      const u = new URL(location.href); u.searchParams.set("session", id); history.replaceState({},"",u);
      renderMessages(); titleEl.textContent = s.title || "ownloom"; closeDrawer();
    });
  });
  drawerBody.querySelectorAll(".del-btn").forEach(btn => {
    btn.addEventListener("click", async e => { e.stopPropagation(); await SessionStore.delete(btn.dataset.del); refreshSessionList(); if (btn.dataset.del === sessionId) document.getElementById("btn-new").click(); });
  });
}

/* ── Restore from URL ────────────────────────────────────────────────────── */
import("./main.js").catch(()=>{});  // no-op, prevents module boundary warning
(async () => {
  const id = new URLSearchParams(location.search).get("session");
  if (!id) return;
  const s = await SessionStore.get(id);
  if (!s) { document.getElementById("btn-new").click(); return; }
  sessionId = id; messages = s.messages.map(m => ({...m, partial: false}));
  renderMessages(); titleEl.textContent = s.title || "ownloom";
})();

/* ── Prevent module boundary error (we're in <script type="module">) ─────── */

document.currentScript?.remove?.(); // remove the inline script tag reference
</script>
</body>
</html>
