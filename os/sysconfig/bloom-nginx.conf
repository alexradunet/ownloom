map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Default server — status page + Cinny + Matrix API
server {
    listen 80 default_server;
    server_name _;

    # Cinny web client (Quadlet container on port 18810)
    # Cinny serves assets from absolute paths (/assets/, /public/, etc.)
    # so we must proxy all Cinny-related paths, not just /cinny/.
    location /cinny/ {
        proxy_pass http://127.0.0.1:18810/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /assets/ {
        proxy_pass http://127.0.0.1:18810/assets/;
    }
    location /public/ {
        proxy_pass http://127.0.0.1:18810/public/;
    }
    location = /manifest.json {
        proxy_pass http://127.0.0.1:18810/manifest.json;
    }
    location = /config.json {
        proxy_pass http://127.0.0.1:18810/config.json;
    }
    location = /sw.js {
        proxy_pass http://127.0.0.1:18810/sw.js;
    }
    location = /olm.wasm {
        proxy_pass http://127.0.0.1:18810/olm.wasm;
    }
    location = /pdf.worker.min.js {
        proxy_pass http://127.0.0.1:18810/pdf.worker.min.js;
    }

    # Matrix client-server API proxy
    location /_matrix/ {
        proxy_pass http://127.0.0.1:6167;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        client_max_body_size 20m;
    }

    location / {
        root /usr/share/nginx/html;
        index bloom-status.html;
    }
}

# Service-specific vhosts are auto-generated in /etc/nginx/conf.d/bloom-*.conf
# by the service routing system (lib/service-routing.ts) during service_install.
