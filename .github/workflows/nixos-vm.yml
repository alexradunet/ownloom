name: NixOS VM Tests

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Which NixOS VM lane to run"
        required: true
        default: "nixos-full"
        type: choice
        options:
          - nixos-smoke
          - nixos-full
          - nixos-destructive
  schedule:
    - cron: "0 3 * * *"

jobs:
  nixos-vm:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Select lane
        id: lane
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "value=nixos-full" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.lane }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Run NixOS VM lane
        run: nix build .#checks.x86_64-linux.${{ steps.lane.outputs.value }} --no-link -L
