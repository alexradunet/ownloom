version: 1
source_repo: https://github.com/pibloom/pi-bloom
services:
  lemonade:
    version: "0.1.0"
    category: ai
    image: ghcr.io/lemonade-sdk/lemonade-server:latest
    optional: false
    preflight:
      commands: [podman, systemctl]
  whatsapp:
    version: "0.2.0"
    category: communication
    optional: true
    native: true
    preflight:
      commands: [systemctl]
  dufs:
    version: "0.1.0"
    category: sync
    image: docker.io/sigoden/dufs:latest
    optional: false
    preflight:
      commands: [podman, systemctl]
